<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile card</title>
</head>
<style>
    .profile-img{
        width:200px;
        height:200px;
        border-radius: 50%;
        object-fit: cover;
        margin: 15px 0;
    }
    body{
        background-color: lavender;
    }
    p{
        color: darkgray;
        font-size: 17px;
        margin-bottom: 12px;
    }
    .container{
            background-color: white;
            width:75%;
            margin: 40px auto;
            max-width: fit-content;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
    }
    h1{
        font-size: 25px;
        margin:22px 0 14px;
    }
    .btn{
            padding:10px 17px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            background-color: rgb(212, 100, 237);
            cursor: pointer;
            font-size: 15px;
        }
        a{
            color: white;
            text-decoration: none;
        }
        .btn:hover{
            background-color: rgb(81, 0, 139);
        }


</style>
<body>
   <div class="container">
    <h1>Student Profile</h1>
    <img src="manika.jpeg" class="profile-img">
    <p>Manika Arora</p>
    <p>Student | Arya P.G. College</p>
    <p>Bachelor of Computer Applications</p>
    <button class="btn">
        <a href="https://www.youtube.com/channel/UCl4_gsXut6b5WBQHAnMxQUA">youtube</a>
    </button>
    <button class="btn">
        <a href="https://www.instagram.com/">follow</a>
    </button>
    <p>Contact: +91-7015443657</p>
   </div> 
</body>
</html>
