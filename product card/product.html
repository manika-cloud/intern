<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product card</title>
  </head>
  <link rel="stylesheet" href="style1.css" />
  <body>
    <div class="container">
      <div class="product1">
        <img src="watch.jpg" alt="" />
        <div class="content">
          <h3>Signature Series Wristwatch</h3>
          <span class="price">₹7000</span>
          <div class="rating">
            <img src="rating.png" alt="" />
            <span>(49 reviews)</span>
          </div>
          <button>Add To Cart</button>
        </div>
      </div>
      <div class="product2">
        <img src="haedphone.jpg" alt="" />
        <div class="content">
          <h3>Wireless headphones</h3>
          <span class="price">₹3999</span>
          <div class="rating">
            <img src="rating.png" alt="" />
            <span>(101 reviews)</span>
          </div>
          <button>Add To Cart</button>
        </div>
      </div>
      <div class="product3">
        <img src="handbag.png" alt="" />
        <div class="content">
          <h3>Luxury Handbag</h3>
          <span class="price">₹14999</span>
          <div class="rating">
            <img src="rating.png" alt="" />
            <span>(179 reviews)</span>
          </div>
          <button>Add To Cart</button>
        </div>
      </div>
    </div>
  </body>
</html>
